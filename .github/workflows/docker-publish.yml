name: Publish to Docker Hub

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. 2.6.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and Push Docker (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || '' }}

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check Docker Hub credentials
        id: dockerhub
        shell: bash
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub credentials found."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub credentials missing. Docker Hub publish will be skipped."
          fi

      - name: Login to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from release tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing Docker image version: $VERSION"

      - name: Build and push multi-arch image (GHCR)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/omniroute:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/omniroute:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: false
        env:
          DOCKER_BUILDKIT_INLINE_CACHE: 1

      - name: Build and push multi-arch image (Docker Hub)
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/omniroute:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/omniroute:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: false
        env:
          DOCKER_BUILDKIT_INLINE_CACHE: 1

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "ghcr.io/${{ github.repository_owner }}/omniroute:${{ steps.version.outputs.version }}"

      - name: Update Docker Hub description
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/omniroute
          short-description: "OmniRoute — Unified AI proxy. Route any LLM through one endpoint."
          readme-filepath: ./README.md
